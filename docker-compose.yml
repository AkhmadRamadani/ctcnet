services:
  ctcnet-api:
    build: .
    container_name: ctcnet_api
    ports:
      - "8000:8000"
    volumes:
      # Mount your trained model file here
      - ./ctcgan_generator.pth:/app/ctcgan_generator.pth:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

